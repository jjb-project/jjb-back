spring:
  ai:
    google:
      genai:
        chat:
          model: gemini-flash-lite-latest
          temperature: 0.7
        api-key: AIzaSyD9XuUbSZTRLTRPIPQBM6LGVjihWuEs6VM
  application:
    name: jjb
  datasource:
    url: jdbc:postgresql://localhost:5432/part
    username: app_user
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH_CLIENT_ID:local-google-client-id}
            client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:local-google-client-secret}
            scope:
              - openid
              - email
              - profile
          apple:
            provider: apple
            client-id: ${APPLE_CLIENT_ID:local-apple-client-id}
            client-secret: ${APPLE_CLIENT_SECRET:local-apple-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - email
              - name
            client-name: Apple
        provider:
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            jwk-set-uri: https://appleid.apple.com/auth/keys
            user-name-attribute: sub

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
