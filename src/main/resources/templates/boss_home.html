<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('사장님 홈')}"></head>
<body>
<main class="app-shell" data-live-refresh>
  <section class="screen active">
    <header class="home-topbar">
      <a class="logo-mark" th:href="@{/boss/home}">
        <span class="logo-icon"><i class="fa-solid fa-bolt"></i></span>
        <span class="logo-text">바로<span>알바</span></span>
      </a>
      <div class="home-actions">
        <a class="mode-switch-link" th:href="@{/role}">
          <i class="fa-solid fa-repeat"></i>
          모드 전환
        </a>
        <a class="avatar avatar-48 avatar-boss" th:href="@{/mypage}" aria-label="마이페이지">
          <i class="fa-solid fa-store"></i>
        </a>
      </div>
    </header>

    <div class="boss-header">
      <p class="eyebrow">사장님 모드</p>
      <h1 th:text="${member == null ? '오늘 필요한 인력을 찾아보세요' : member.displayName() + '님, 인재를 확인하세요'}">인재 추천</h1>
      <p>구직자가 등록한 프로필을 보고, 사업자 인증 후 매칭 요청을 보낼 수 있습니다.</p>
      <div class="header-actions">
        <a class="btn btn-outline bright" th:href="@{/boss/verify}" th:if="${!memberVerified}">
          <i class="fa-solid fa-shield-halved"></i>
          사업자 인증
        </a>
        <a class="btn btn-outline bright" href="#candidates">
          <i class="fa-solid fa-users"></i>
          구직자 보기
        </a>
      </div>
    </div>

    <div class="section-header" id="candidates">
      <span class="section-title">추천 인재</span>
      <button class="section-more link-button" type="button"
              th:if="${memberVerified}"
              data-recommendation-trigger
              data-recommendation-target="boss-recommendations"
              th:attr="data-recommendation-url=${recommendationUrl}">
        AI 추천받기
      </button>
      <a class="section-more" th:if="${!memberVerified}" th:href="@{/boss/verify}">인증 후 추천</a>
    </div>

    <form class="search-panel" th:action="@{/boss/home}" method="get">
      <input class="form-input" name="keyword" placeholder="검색어" th:value="${keyword}">
      <div class="select-grid">
        <input class="form-input" name="region" placeholder="지역" th:value="${region}">
        <input class="form-input" name="industry" placeholder="경험업종" th:value="${industry}">
      </div>
      <label class="check-row compact">
        <input type="checkbox" name="favoritesOnly" value="true" th:checked="${favoritesOnly}">
        <span>찜만 보기</span>
      </label>
      <button class="btn btn-secondary btn-sm" type="submit">조건 검색</button>
    </form>

    <div class="recommendation-panel" id="boss-recommendations" data-recommendation-results hidden></div>

    <div class="empty-state" th:if="${#lists.isEmpty(candidates)}">
      등록된 구직자 프로필이 없습니다.
    </div>

    <a class="candidate-card link-card" th:each="candidate : ${candidates}"
       th:href="@{/boss/candidates/{id}(id=${candidate.id})}">
      <div class="candidate-top">
        <div class="avatar avatar-48 avatar-worker"><i class="fa-regular fa-user"></i></div>
        <div class="candidate-info">
          <strong class="candidate-name" th:text="${candidate.name}">구직자명</strong>
          <span th:text="${candidate.availableTime}">오늘 가능</span>
          <span th:text="${candidate.area}">서울 강남구</span>
        </div>
      </div>
      <div class="candidate-tags">
        <span class="tag-chip active" th:text="${candidate.skills}">입력한 경험 업종</span>
        <span class="tag-chip" th:text="${#numbers.formatInteger(candidate.desiredHourlyWage, 0, 'COMMA')} + '원 이상'">13,000원 이상</span>
        <span class="tag-chip" th:text="'평점 ' + ${candidate.averageRating} + ' · 후기 ' + ${candidate.reviewCount} + '개'">후기 0개</span>
        <span class="tag-chip active" th:text="${candidate.trustLabel}">긴급 대타 가능</span>
        <span class="tag-chip active" th:if="${candidate.favorite}">찜한 인재</span>
      </div>
      <span class="btn btn-primary btn-sm">상세 보기</span>
    </a>

    <div class="section-header">
      <span class="section-title">받은 지원 요청</span>
      <span class="section-more" th:text="${#lists.size(workerRequests)} + '건'">0건</span>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(workerRequests)}">
      아직 구직자가 보낸 지원 요청이 없습니다.
    </div>

    <article class="request-card" th:each="request : ${workerRequests}">
      <div class="request-card-header">
        <div class="avatar avatar-48 avatar-worker"><i class="fa-regular fa-user"></i></div>
        <div class="request-main">
          <strong th:text="${request.jobSeekerName}">구직자명</strong>
          <span th:text="${request.message}">근무 지원합니다.</span>
        </div>
        <span class="badge badge-green" th:text="${request.status}">요청 중</span>
      </div>
      <div class="action-row" th:if="${request.status == '요청 중'}">
        <form th:action="@{/boss/requests/{id}/decline(id=${request.id})}" method="post">
          <button class="btn btn-outline" type="submit">거절</button>
        </form>
        <form th:action="@{/boss/requests/{id}/accept(id=${request.id})}" method="post">
          <button class="btn btn-primary" type="submit">수락</button>
        </form>
      </div>
    </article>
  </section>
</main>
<div th:replace="~{fragments/layout :: bottomNav('home')}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
