<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('모집 등록')}"></head>
<body class="web-page">
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<div class="web-narrow">
  <form class="form-screen" th:action="@{/boss/recruitments}" method="post">
    <div class="page-intro">
      <h1>필요한 근무 조건을<br>등록해주세요</h1>
      <p>사업자 인증이 끝난 사장님만 모집을 등록할 수 있습니다.</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="title">모집 제목</label>
      <input class="form-input" id="title" name="title" placeholder="예: 카페 마감 알바 급구" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="workDate">근무일</label>
      <input class="form-input" id="workDate" name="workDate" type="date" required>
    </div>
    <div class="inline-field">
      <div class="form-group">
        <label class="form-label" for="startTime">시작</label>
        <input class="form-input" id="startTime" name="startTime" type="time" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="endTime">종료</label>
        <input class="form-input" id="endTime" name="endTime" type="time" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">근무지</label>
      <input type="hidden" id="workplaceAddress" name="workplaceAddress">
      <div class="select-grid" data-region-picker data-region-target="workplaceAddress"
           data-region-districts='{
             "서울특별시":["강남구","마포구","서초구","송파구","강동구","노원구","관악구","영등포구","성북구","중구","종로구","용산구","은평구","서대문구","강서구","광진구","동대문구","성동구","양천구","강북구","도봉구","중랑구","구로구","금천구","동작구"],
             "부산광역시":["부산진구","해운대구","수영구","남구","동래구","북구","사하구","금정구","연제구","사상구","중구","동구","서구","영도구","강서구","기장군"],
             "대구광역시":["수성구","달서구","중구","북구","동구","서구","남구","달성군"],
             "인천광역시":["부평구","남동구","연수구","계양구","서구","미추홀구","중구","동구","강화군","옹진군"],
             "광주광역시":["서구","북구","광산구","남구","동구"],
             "대전광역시":["유성구","서구","중구","동구","대덕구"],
             "울산광역시":["남구","북구","중구","동구","울주군"],
             "세종특별자치시":["세종시 전역"],
             "경기도":["수원시","성남시","고양시","용인시","부천시","안산시","안양시","남양주시","화성시","평택시","의정부시","시흥시","파주시","광명시","광주시","군포시","오산시","이천시","양주시","구리시","안성시","포천시","의왕시","하남시","여주시","동두천시","과천시"],
             "강원특별자치도":["춘천시","원주시","강릉시","동해시","태백시","속초시","삼척시","홍천군","횡성군","영월군","평창군","정선군","철원군","화천군","양구군","인제군","고성군","양양군"],
             "충청북도":["청주시","충주시","제천시","보은군","옥천군","영동군","증평군","진천군","괴산군","음성군","단양군"],
             "충청남도":["천안시","공주시","보령시","아산시","서산시","논산시","계룡시","당진시","금산군","부여군","서천군","청양군","홍성군","예산군","태안군"],
             "전북특별자치도":["전주시","익산시","군산시","정읍시","남원시","김제시","완주군","진안군","무주군","장수군","임실군","순창군","고창군","부안군"],
             "전라남도":["목포시","여수시","순천시","나주시","광양시","담양군","곡성군","구례군","고흥군","보성군","화순군","장흥군","강진군","해남군","영암군","무안군","함평군","영광군","장성군","완도군","진도군","신안군"],
             "경상북도":["포항시","경주시","김천시","안동시","구미시","영주시","영천시","상주시","문경시","경산시","군위군","의성군","청송군","영양군","영덕군","청도군","고령군","성주군","칠곡군","예천군","봉화군","울진군","울릉군"],
             "경상남도":["창원시","진주시","통영시","사천시","김해시","밀양시","거제시","양산시","의령군","함안군","창녕군","고성군","남해군","하동군","산청군","함양군","거창군","합천군"],
             "제주특별자치도":["제주시","서귀포시"]
           }'>
        <select class="form-input" data-region-province>
          <option value="">시/도 선택</option>
          <option value="서울특별시">서울특별시</option>
          <option value="부산광역시">부산광역시</option>
          <option value="대구광역시">대구광역시</option>
          <option value="인천광역시">인천광역시</option>
          <option value="광주광역시">광주광역시</option>
          <option value="대전광역시">대전광역시</option>
          <option value="울산광역시">울산광역시</option>
          <option value="세종특별자치시">세종특별자치시</option>
          <option value="경기도">경기도</option>
          <option value="강원특별자치도">강원특별자치도</option>
          <option value="충청북도">충청북도</option>
          <option value="충청남도">충청남도</option>
          <option value="전북특별자치도">전북특별자치도</option>
          <option value="전라남도">전라남도</option>
          <option value="경상북도">경상북도</option>
          <option value="경상남도">경상남도</option>
          <option value="제주특별자치도">제주특별자치도</option>
        </select>
        <select class="form-input" data-region-district>
          <option value="">구/시/군 선택</option>
        </select>
      </div>
      <input class="form-input" data-region-detail style="margin-top:8px"
             placeholder="상세 주소 입력 (예: 역삼동 123-4, OO빌딩 1층)">
    </div>
    <div class="form-group">
      <label class="form-label" for="hourlyWage">시급</label>
      <div class="wage-input-wrap">
        <input class="form-input" id="hourlyWage" name="hourlyWage" type="number" min="10000" step="10" placeholder="13000" required>
        <span class="wage-suffix">원</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">테마 태그 <span style="font-weight:400;color:var(--text-3)">(중복 선택 가능)</span></label>
      <input type="hidden" name="tags" id="tagsInput">
      <div class="toggle-group" data-multi-toggle="tags">
        <button type="button" class="toggle-item" data-val="역세권">🚇 역세권</button>
        <button type="button" class="toggle-item" data-val="단시간">⏱ 단시간</button>
        <button type="button" class="toggle-item" data-val="급구">⚡ 급구</button>
        <button type="button" class="toggle-item" data-val="풀타임">☀ 풀타임</button>
        <button type="button" class="toggle-item" data-val="대학가">🎓 대학가</button>
        <button type="button" class="toggle-item" data-val="브랜드">🏷 브랜드</button>
        <button type="button" class="toggle-item" data-val="야간">🌙 야간</button>
        <button type="button" class="toggle-item" data-val="주말">📅 주말</button>
      </div>
    </div>

    <label class="instant-hire-row">
      <input type="checkbox" name="instantHire" value="true">
      <span class="instant-hire-text">
        <strong><i class="fa-solid fa-bolt"></i> 즉시확정(선착순) 공고로 등록</strong>
        <small>지원자가 별도 승인 없이 바로 매칭 확정됩니다. 급구일 때 추천!</small>
      </span>
    </label>

    <div class="form-group">
      <div class="form-label-row">
        <label class="form-label" for="description">상세 설명</label>
        <button type="button" class="ai-assist-btn" id="aiRecruitmentBtn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> AI로 작성
        </button>
      </div>
      <textarea class="form-input" id="description" name="description" rows="5"
                placeholder="근무 내용·분위기·우대사항을 적어주세요. 위 정보를 입력한 뒤 'AI로 작성'을 누르면 초안을 만들어드려요."></textarea>
    </div>

    <button class="btn btn-primary" type="submit">
      <i class="fa-solid fa-plus"></i>
      모집 등록
    </button>
  </form>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
  var addr = document.getElementById('workplaceAddress').value;
  if (!addr || !addr.trim()) {
    e.preventDefault();
    alert('근무지(시/도, 구/시/군)를 선택해주세요.');
    document.querySelector('[data-region-province]').focus();
  }
});

document.getElementById('aiRecruitmentBtn').addEventListener('click', function() {
  var btn = this;
  var area = document.getElementById('workplaceAddress').value;
  if (!document.getElementById('title').value.trim()) {
    alert('먼저 모집 제목을 입력해주세요.');
    return;
  }
  aiFill(btn, '/api/ai/recruitment', {
    title: document.getElementById('title').value,
    address: area,
    hourlyWage: document.getElementById('hourlyWage').value,
    tags: document.getElementById('tagsInput').value
  }, 'description');
});
</script>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
