<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('모집 등록')}"></head>
<body>
<main class="app-shell">
  <section class="screen active">
    <div th:replace="~{fragments/layout :: topbar('모집 등록', '/boss/home')}"></div>

    <form class="form-screen" th:action="@{/boss/recruitments}" method="post">
      <div class="page-intro">
        <h1>필요한 근무 조건을<br>등록해주세요</h1>
        <p>사업자 인증이 끝난 사장님만 모집을 등록할 수 있습니다.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="title">모집 제목</label>
        <input class="form-input" id="title" name="title" placeholder="예: 카페 마감 알바 급구" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="workDate">근무일</label>
        <input class="form-input" id="workDate" name="workDate" type="date" required>
      </div>
      <div class="inline-field">
        <div class="form-group">
          <label class="form-label" for="startTime">시작</label>
          <input class="form-input" id="startTime" name="startTime" type="time" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="endTime">종료</label>
          <input class="form-input" id="endTime" name="endTime" type="time" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="workplaceAddress">근무지</label>
        <input class="form-input" id="workplaceAddress" name="workplaceAddress" placeholder="예: 서울 강남구 역삼동" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="hourlyWage">시급</label>
        <div class="wage-input-wrap">
          <input class="form-input" id="hourlyWage" name="hourlyWage" type="number" min="10000" step="100" placeholder="13000" required>
          <span class="wage-suffix">원</span>
        </div>
      </div>

      <button class="btn btn-primary" type="submit">
        <i class="fa-solid fa-plus"></i>
        모집 등록
      </button>
    </form>
  </section>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
