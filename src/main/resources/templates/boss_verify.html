<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('사업자 인증')}"></head>
<body class="web-page">
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<div class="web-narrow">
  <form class="form-screen" th:action="@{/boss/verify}" method="post">
    <div class="page-intro">
      <h1>첫 매칭 요청 전<br>사업자 인증이 필요해요</h1>
      <p>사장님 모드 탐색과 후보 조회는 가능하지만 매칭 요청은 인증 후 진행됩니다.</p>
    </div>

    <div class="verify-step">
      <span class="verify-step-num">1</span>
      <div>
        <strong>사업자 정보 입력</strong>
        <p>사업자등록번호, 대표자명, 개업일자를 확인합니다.</p>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="businessRegistrationNumber">사업자등록번호</label>
      <input class="form-input" id="businessRegistrationNumber" name="businessRegistrationNumber" placeholder="123-45-67890" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="representativeName">대표자명</label>
      <input class="form-input" id="representativeName" name="representativeName" placeholder="대표자명" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="openingDate">개업일자</label>
      <input class="form-input" id="openingDate" name="openingDate" type="date" required>
    </div>

    <div class="form-section-title">매장 정보</div>
    <div class="form-group">
      <label class="form-label" for="storeName">매장명</label>
      <input class="form-input" id="storeName" name="storeName" placeholder="매장명" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="storeAddress">매장 주소</label>
      <input class="form-input" id="storeAddress" name="storeAddress" placeholder="매장 주소" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="businessCategory">업종</label>
      <input class="form-input" id="businessCategory" name="businessCategory" placeholder="업종을 직접 입력해주세요" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="storeIntroduction">매장 소개</label>
      <textarea class="form-input" id="storeIntroduction" name="storeIntroduction" rows="3" placeholder="예: 역 근처라 출퇴근이 편하고, 처음 오신 분도 쉽게 배울 수 있어요."></textarea>
      <p class="form-help">구직자에게는 이렇게 보여요: 매장 분위기, 맡을 일, 쉬운 점을 짧게 적어주세요.</p>
    </div>

    <button class="btn btn-primary" type="submit">
      <i class="fa-solid fa-shield-halved"></i>
      인증 완료
    </button>
  </form>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
