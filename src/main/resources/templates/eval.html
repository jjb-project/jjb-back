<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('평가')}"></head>
<body>
<main class="app-shell">
  <section class="screen active">
    <div th:replace="~{fragments/layout :: topbar('근무 평가', '/mypage')}"></div>

    <form class="form-screen" th:action="@{/mypage}" method="get">
      <div class="page-intro">
        <h1>함께 일한 경험을<br>평가해주세요</h1>
        <p>구직자와 사장님 모두 평가 대상이며, 신뢰 점수에 반영됩니다.</p>
      </div>

      <div class="rating-row" data-rating>
        <button class="star-btn" type="button" data-star="1"><i class="fa-solid fa-star"></i></button>
        <button class="star-btn" type="button" data-star="2"><i class="fa-solid fa-star"></i></button>
        <button class="star-btn" type="button" data-star="3"><i class="fa-solid fa-star"></i></button>
        <button class="star-btn" type="button" data-star="4"><i class="fa-solid fa-star"></i></button>
        <button class="star-btn" type="button" data-star="5"><i class="fa-solid fa-star"></i></button>
      </div>

      <div class="form-group">
        <label class="form-label" for="review">후기</label>
        <textarea class="form-input" id="review" rows="4" placeholder="약속, 업무 태도, 소통에 대해 남겨주세요."></textarea>
      </div>

      <button class="btn btn-primary" type="submit">평가 저장</button>
    </form>
  </section>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
