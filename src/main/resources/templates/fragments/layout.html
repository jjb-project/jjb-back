<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} + ' - 바로알바'">바로알바</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:fragment="topbar(title, backHref)" class="topbar">
  <a class="topbar-back" th:href="@{${backHref}}" aria-label="뒤로">
    <i class="fa-solid fa-chevron-left"></i>
  </a>
  <span class="topbar-title" th:text="${title}">바로알바</span>
  <span class="topbar-spacer" aria-hidden="true"></span>
</header>

<nav th:fragment="bottomNav(active)" class="bottom-nav">
  <a class="nav-item" th:classappend="${active == 'home'} ? 'active'" th:href="@{/worker/home}">
    <i class="fa-solid fa-house"></i>
    홈
  </a>
  <a class="nav-item" th:if="${activeRole != null and activeRole.name() == 'JOB_SEEKER'}"
     th:classappend="${active == 'post'} ? 'active'" th:href="@{/worker/profile/edit}">
    <i class="fa-regular fa-square-plus"></i>
    등록
  </a>
  <a class="nav-item" th:classappend="${active == 'my'} ? 'active'" th:href="@{/mypage}">
    <i class="fa-regular fa-user"></i>
    MY
  </a>
</nav>

<div th:fragment="toast">
  <div th:if="${successMessage}" class="toast-notification toast-success" id="toastSuccess">
    <i class="fa-solid fa-circle-check"></i>
    <span th:text="${successMessage}">완료되었습니다.</span>
  </div>
  <div th:if="${errorMessage}" class="toast-notification toast-error" id="toastError">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span th:text="${errorMessage}">오류가 발생했습니다.</span>
  </div>
</div>

<header th:fragment="siteHeader" class="site-header">
<div th:replace="~{fragments/layout :: toast}"></div>
  <div class="site-header-top">
    <a class="logo-mark" th:href="@{/}">
      <span class="logo-icon"><i class="fa-solid fa-bolt"></i></span>
      <span class="logo-text">바로<span>알바</span></span>
    </a>
    <form class="site-search" th:action="@{/jobs}" method="get">
      <div class="search-field">
        <input name="keyword" placeholder="검색으로 딱! 알바 찾기" autocomplete="off">
        <button class="search-btn" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
    </form>
    <div class="site-header-actions">
      <a th:if="${member == null}" th:href="@{/login}">로그인</a>
      <a th:if="${member == null}" th:href="@{/signup}">회원가입</a>
      <th:block th:if="${member != null}">
        <a class="mode-badge"
           th:classappend="${activeRole != null and activeRole.name() == 'OWNER'} ? ' mode-badge--boss'"
           th:href="@{/role}">
          <i class="fa-solid fa-circle-half-stroke"></i>
          <span th:text="${activeRole != null and activeRole.name() == 'OWNER'} ? '사장님 모드' : '구직자 모드'">구직자 모드</span>
          <i class="fa-solid fa-chevron-down" style="font-size:10px;opacity:.7"></i>
        </a>
        <a class="notif-bell" th:href="@{/notifications}" aria-label="알림">
          <i class="fa-regular fa-bell"></i>
          <span class="notif-bell-dot" th:if="${unreadNotifications != null and unreadNotifications > 0}"
                th:text="${unreadNotifications > 9} ? '9+' : ${unreadNotifications}">1</span>
        </a>
        <a class="avatar avatar-48" th:href="@{/mypage}" aria-label="마이페이지">
          <i class="fa-regular fa-user"></i>
        </a>
      </th:block>
    </div>
  </div>
  <nav class="site-gnb" aria-label="주요 메뉴">
    <div class="site-gnb-inner">
      <div class="site-gnb-menu">
        <a class="gnb-allmenu" th:href="@{/}"><i class="fa-solid fa-bars"></i> 전체메뉴</a>
        <a th:href="@{/jobs}">채용정보</a>
        <a th:href="@{/(tab='resumes')}">인재정보</a>
        <a th:href="@{/jobs(keyword='역세권')}">테마별알바</a>
        <a th:href="@{/jobs(region='서울특별시')}">지역별알바</a>
        <a th:href="@{/substitutes}">대타마켓</a>
        <a th:href="@{/inbox}">매칭제안함</a>
        <a th:href="@{/eval}">평가관리</a>
      </div>
    </div>
  </nav>
</header>

<div th:fragment="scripts">
  <script th:src="@{/js/app.js}"></script>
</div>
</body>
</html>
