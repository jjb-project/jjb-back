<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('시작')}"></head>
<body>
<main class="app-shell">
  <section class="screen active no-bottom">
    <div class="login-hero">
      <div class="login-logo">
        <i class="fa-solid fa-bolt"></i>
      </div>
      <h1 class="login-headline">급할 때 바로 매칭,<br>믿을 수 있는 단기 알바</h1>
      <p class="login-sub">구직자는 가능 시간을 등록하고 사장님은 검증된 인재에게 바로 요청합니다.</p>
    </div>

    <div class="service-icons">
      <div class="service-icon-item">
        <div class="service-icon-circle"><i class="fa-solid fa-stopwatch"></i></div>
        <span class="service-icon-label">즉시 매칭</span>
      </div>
      <div class="service-icon-item">
        <div class="service-icon-circle"><i class="fa-solid fa-shield-halved"></i></div>
        <span class="service-icon-label">본인 인증</span>
      </div>
      <div class="service-icon-item">
        <div class="service-icon-circle"><i class="fa-solid fa-store"></i></div>
        <span class="service-icon-label">사업자 인증</span>
      </div>
      <div class="service-icon-item">
        <div class="service-icon-circle"><i class="fa-solid fa-star"></i></div>
        <span class="service-icon-label">양방향 평가</span>
      </div>
    </div>

    <div class="login-btns">
      <p class="page-message error" th:if="${errorMessage}" th:text="${errorMessage}"></p>

      <a class="social-btn social-btn-google" th:href="@{/oauth2/authorization/google}">
        <span class="social-btn-icon">G</span>
        <span class="social-btn-label">Google로 시작하기</span>
      </a>

      <a class="social-btn social-btn-kakao" th:href="@{/oauth2/authorization/kakao}">
        <span class="social-btn-icon">K</span>
        <span class="social-btn-label">카카오로 시작하기</span>
      </a>

      <a class="social-btn social-btn-naver" th:href="@{/oauth2/authorization/naver}">
        <span class="social-btn-icon">N</span>
        <span class="social-btn-label">네이버로 시작하기</span>
      </a>
    </div>

    <p class="terms-copy">가입하면 서비스 이용약관 및 개인정보처리방침에 동의합니다.</p>
  </section>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
