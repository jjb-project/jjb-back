<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('모드 전환')}"></head>
<body class="web-page">
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<div class="login-page-wrap">
  <div class="login-page-card" style="max-width:480px">

    <div style="text-align:center">
      <p style="font-size:13px;color:var(--text-3);margin-bottom:6px">현재 모드</p>
      <h1 style="font-size:20px;font-weight:800;color:var(--ink)">
        <span th:text="${activeRole != null and activeRole.name() == 'OWNER'} ? '사장님 모드' : '구직자 모드'">구직자 모드</span>
      </h1>
    </div>

    <form th:action="@{/role}" method="post" style="display:contents" data-role-form>
      <button class="role-switch-card"
              th:classappend="${activeRole == null or activeRole.name() == 'JOB_SEEKER'} ? ' role-switch-card--active'"
              type="submit" name="role" value="JOB_SEEKER">
        <span class="role-switch-icon role-switch-icon--worker"><i class="fa-solid fa-person-running"></i></span>
        <span class="role-switch-info">
          <strong>구직자 모드</strong>
          <span>알바를 찾고 사장님의 제안을 받아요</span>
        </span>
        <span class="role-switch-check" th:if="${activeRole == null or activeRole.name() == 'JOB_SEEKER'}">
          <i class="fa-solid fa-check"></i>
        </span>
      </button>

      <button class="role-switch-card"
              th:classappend="${activeRole != null and activeRole.name() == 'OWNER'} ? ' role-switch-card--active role-switch-card--boss'"
              type="submit" name="role" value="OWNER">
        <span class="role-switch-icon role-switch-icon--boss"><i class="fa-solid fa-store"></i></span>
        <span class="role-switch-info">
          <strong>사장님 모드</strong>
          <span>공고를 올리고 딱 맞는 알바생을 찾아요</span>
        </span>
        <span class="role-switch-check" th:if="${activeRole != null and activeRole.name() == 'OWNER'}">
          <i class="fa-solid fa-check"></i>
        </span>
      </button>
    </form>

    <p style="text-align:center;font-size:12px;color:var(--text-3)">
      하나의 계정으로 두 모드를 자유롭게 전환할 수 있어요.
    </p>

  </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
