<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('이력서 등록')}"></head>
<body class="web-page">
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<div class="web-narrow">
  <form class="form-screen compact" th:action="@{/worker/profile}" method="post">

    <div class="page-intro">
      <h1>나의 이력서를<br>등록해요</h1>
      <p>작성한 정보는 사장님의 매칭 제안에 활용됩니다.</p>
    </div>

    <!-- ── 기본 정보 ── -->
    <p class="form-section-title"><i class="fa-solid fa-user"></i> 기본 정보</p>

    <div class="inline-field">
      <div class="form-group" style="flex:1">
        <label class="form-label">성별</label>
        <div class="toggle-group">
          <label class="toggle-item" th:each="opt : ${ {'남성','여성'} }">
            <input type="radio" name="gender" th:value="${opt}" style="display:none"
                   th:checked="${profile != null and profile.gender() == opt}">
            <span th:text="${opt}">남성</span>
          </label>
        </div>
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">군필여부</label>
        <div class="toggle-group">
          <label class="toggle-item" th:each="opt : ${ {'해당없음','미필','군필','면제'} }">
            <input type="radio" name="militaryService" th:value="${opt}" style="display:none"
                   th:checked="${profile != null and profile.militaryService() == opt}">
            <span th:text="${opt}">해당없음</span>
          </label>
        </div>
      </div>
    </div>

    <div class="inline-field">
      <div class="form-group" style="flex:1">
        <label class="form-label" for="education">최종학력</label>
        <select class="form-input" id="education" name="education">
          <option value="">선택 안함</option>
          <option value="중졸 이하" th:selected="${profile != null and profile.education() == '중졸 이하'}">중졸 이하</option>
          <option value="고교 재학" th:selected="${profile != null and profile.education() == '고교 재학'}">고교 재학</option>
          <option value="고졸" th:selected="${profile != null and profile.education() == '고졸'}">고졸</option>
          <option value="대학 재학" th:selected="${profile != null and profile.education() == '대학 재학'}">대학 재학</option>
          <option value="대졸" th:selected="${profile != null and profile.education() == '대졸'}">대졸</option>
          <option value="대학원 이상" th:selected="${profile != null and profile.education() == '대학원 이상'}">대학원 이상</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label" for="careerLevel">경력</label>
        <select class="form-input" id="careerLevel" name="careerLevel">
          <option value="">선택 안함</option>
          <option value="신입" th:selected="${profile != null and profile.careerLevel() == '신입'}">신입</option>
          <option value="1년 미만" th:selected="${profile != null and profile.careerLevel() == '1년 미만'}">1년 미만</option>
          <option value="1~3년" th:selected="${profile != null and profile.careerLevel() == '1~3년'}">1~3년</option>
          <option value="3년 이상" th:selected="${profile != null and profile.careerLevel() == '3년 이상'}">3년 이상</option>
        </select>
      </div>
    </div>

    <!-- ── 근무 조건 ── -->
    <p class="form-section-title"><i class="fa-solid fa-briefcase"></i> 희망 근무 조건</p>

    <div class="form-group">
      <label class="form-label">희망 근무 요일 <span style="font-weight:400;color:var(--text-3)">(중복 선택 가능)</span></label>
      <input type="hidden" name="preferredDays" id="preferredDays"
             th:value="${profile == null ? '' : #strings.listJoin(profile.preferredDays(), ',')}">
      <div class="toggle-group" data-multi-toggle="preferredDays">
        <button type="button" class="toggle-item"
                th:each="opt : ${ {'월','화','수','목','금','토','일','주5일(평일)','주말'} }"
                th:text="${opt}"
                th:classappend="${profile != null and profile.preferredDays().contains(opt)} ? ' selected'">월</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="availableTime">가능 시간</label>
      <input type="hidden" id="availableTime" name="availableTime" data-available-time-input
             th:value="${profile == null ? defaultAvailableTime : profile.availableTime()}">
      <div class="time-range-fields" data-time-range>
        <input class="form-input" id="availableStartTime" type="time" required data-time-start
               th:value="${availableStartTime}">
        <span class="time-range-separator">~</span>
        <input class="form-input" id="availableEndTime" type="time" required data-time-end
               th:value="${availableEndTime}">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="desiredHourlyWage">희망 시급</label>
      <div class="wage-input-wrap">
        <input class="form-input" id="desiredHourlyWage" name="desiredHourlyWage" type="number"
               th:min="${minimumHourlyWage}" step="10" required
               th:placeholder="${minimumHourlyWage}"
               th:value="${profile == null ? minimumHourlyWage : profile.desiredHourlyWage()}">
        <span class="wage-suffix">원/시간</span>
      </div>
      <p class="form-help" th:text="'최저시급 ' + ${#numbers.formatInteger(minimumHourlyWage, 0, 'COMMA')} + '원 이상으로 입력해주세요.'"></p>
    </div>

    <!-- ── 지역 / 업종 ── -->
    <p class="form-section-title"><i class="fa-solid fa-location-dot"></i> 지역 및 업종</p>

    <div class="form-group">
      <label class="form-label" for="preferredArea">희망 지역</label>
      <input type="hidden" id="preferredArea" name="preferredArea" data-preferred-area-input
             th:value="${profile == null ? '' : profile.preferredArea()}">
      <div class="select-grid" data-region-picker
           data-region-districts='{
             "서울특별시":["강남구","마포구","서초구","송파구","강동구","노원구","관악구","영등포구","성북구","중구","종로구","용산구","은평구","서대문구","강서구","광진구","동대문구","성동구","양천구","강북구","도봉구","중랑구","구로구","금천구","동작구"],
             "부산광역시":["부산진구","해운대구","수영구","남구","동래구","북구","사하구","금정구","연제구","사상구","중구","동구","서구","영도구","강서구","기장군"],
             "대구광역시":["수성구","달서구","중구","북구","동구","서구","남구","달성군"],
             "인천광역시":["부평구","남동구","연수구","계양구","서구","미추홀구","중구","동구","강화군","옹진군"],
             "광주광역시":["서구","북구","광산구","남구","동구"],
             "대전광역시":["유성구","서구","중구","동구","대덕구"],
             "울산광역시":["남구","북구","중구","동구","울주군"],
             "세종특별자치시":["세종시 전역"],
             "경기도":["수원시","성남시","고양시","용인시","부천시","안산시","안양시","남양주시","화성시","평택시","의정부시","시흥시","파주시","광명시","광주시","군포시","오산시","이천시","양주시","구리시","안성시","포천시","의왕시","하남시","여주시","동두천시","과천시"],
             "강원특별자치도":["춘천시","원주시","강릉시","동해시","태백시","속초시","삼척시","홍천군","횡성군","영월군","평창군","정선군","철원군","화천군","양구군","인제군","고성군","양양군"],
             "충청북도":["청주시","충주시","제천시","보은군","옥천군","영동군","증평군","진천군","괴산군","음성군","단양군"],
             "충청남도":["천안시","공주시","보령시","아산시","서산시","논산시","계룡시","당진시","금산군","부여군","서천군","청양군","홍성군","예산군","태안군"],
             "전북특별자치도":["전주시","익산시","군산시","정읍시","남원시","김제시","완주군","진안군","무주군","장수군","임실군","순창군","고창군","부안군"],
             "전라남도":["목포시","여수시","순천시","나주시","광양시","담양군","곡성군","구례군","고흥군","보성군","화순군","장흥군","강진군","해남군","영암군","무안군","함평군","영광군","장성군","완도군","진도군","신안군"],
             "경상북도":["포항시","경주시","김천시","안동시","구미시","영주시","영천시","상주시","문경시","경산시","군위군","의성군","청송군","영양군","영덕군","청도군","고령군","성주군","칠곡군","예천군","봉화군","울진군","울릉군"],
             "경상남도":["창원시","진주시","통영시","사천시","김해시","밀양시","거제시","양산시","의령군","함안군","창녕군","고성군","남해군","하동군","산청군","함양군","거창군","합천군"],
             "제주특별자치도":["제주시","서귀포시"]
           }'>
        <select class="form-input" id="preferredProvince" data-region-province>
          <option value="">시/도 선택</option>
          <option value="서울특별시" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('서울특별시')}">서울특별시</option>
          <option value="부산광역시" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('부산광역시')}">부산광역시</option>
          <option value="대구광역시" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('대구광역시')}">대구광역시</option>
          <option value="인천광역시" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('인천광역시')}">인천광역시</option>
          <option value="광주광역시" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('광주광역시')}">광주광역시</option>
          <option value="대전광역시" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('대전광역시')}">대전광역시</option>
          <option value="울산광역시" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('울산광역시')}">울산광역시</option>
          <option value="세종특별자치시" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('세종특별자치시')}">세종특별자치시</option>
          <option value="경기도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('경기도')}">경기도</option>
          <option value="강원특별자치도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('강원')}">강원특별자치도</option>
          <option value="충청북도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('충청북도')}">충청북도</option>
          <option value="충청남도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('충청남도')}">충청남도</option>
          <option value="전북특별자치도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('전북')}">전북특별자치도</option>
          <option value="전라남도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('전라남도')}">전라남도</option>
          <option value="경상북도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('경상북도')}">경상북도</option>
          <option value="경상남도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('경상남도')}">경상남도</option>
          <option value="제주특별자치도" th:selected="${profile != null and profile.preferredArea() != null and profile.preferredArea().startsWith('제주')}">제주특별자치도</option>
        </select>
        <select class="form-input" id="preferredDistrict" data-region-district>
          <option value="">구/시/군 선택</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">업종 경험 <span style="font-weight:400;color:var(--text-3)">(중복 선택 가능)</span></label>
      <input type="hidden" name="experiencedIndustries" id="experiencedIndustriesInput"
             th:value="${profile == null ? '' : #strings.listJoin(profile.experiencedIndustries(), ',')}">
      <div class="toggle-group" data-multi-toggle="experiencedIndustries">
        <button type="button" class="toggle-item"
                th:each="opt : ${ {'외식·음료','편의점','마트·유통','서비스·영업','물류·배달','사무보조','IT·디자인','교육·강의','의료·복지','기타'} }"
                th:text="${opt}"
                th:classappend="${profile != null and profile.experiencedIndustries().contains(opt)} ? ' selected'">외식·음료</button>
      </div>
    </div>

    <!-- ── 자기소개 ── -->
    <p class="form-section-title"><i class="fa-solid fa-pen"></i> 자기소개</p>

    <label class="check-row">
      <input type="checkbox" name="urgentSubstituteAvailable" value="true"
             th:checked="${profile == null || profile.urgentSubstituteAvailable()}">
      <span>긴급 대타 요청을 받을 수 있어요</span>
    </label>

    <div class="form-group">
      <div class="form-label-row">
        <label class="form-label" for="introduction">자기소개</label>
        <button type="button" class="ai-assist-btn" id="aiIntroBtn">
          <i class="fa-solid fa-wand-magic-sparkles"></i> AI로 작성
        </button>
      </div>
      <textarea class="form-input" id="introduction" name="introduction" rows="4"
                placeholder="예: 카페 마감 2년 경험 있고, 오늘 저녁 긴급 대타 가능합니다. 위 정보를 입력한 뒤 'AI로 작성'을 누르면 초안을 만들어드려요."
                th:text="${profile == null ? '' : profile.introduction()}"></textarea>
    </div>

    <button class="btn btn-primary" type="submit">
      <i class="fa-solid fa-check"></i>
      이력서 저장
    </button>

  </form>
</div>

<script>
document.getElementById('aiIntroBtn').addEventListener('click', function() {
  var genderEl = document.querySelector('input[name="gender"]:checked');
  aiFill(this, '/api/ai/introduction', {
    gender: genderEl ? genderEl.value : '',
    careerLevel: document.getElementById('careerLevel').value,
    industries: document.getElementById('experiencedIndustriesInput').value,
    area: document.getElementById('preferredArea').value,
    availableTime: document.getElementById('availableTime').value
  }, 'introduction');
});
</script>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
