<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('구직자 프로필')}"></head>
<body>
<main class="app-shell">
  <section class="screen active">
    <div th:replace="~{fragments/layout :: topbar('구직자 프로필', '/worker/home')}"></div>
    <div class="progress-bar"><div class="progress-fill progress-full"></div></div>

    <form class="form-screen" th:action="@{/worker/profile}" method="post">
      <div class="page-intro">
        <h1>일할 수 있는 시간과<br>경험을 알려주세요</h1>
        <p>입력한 정보는 사장님이 매칭 요청을 보낼 때 참고합니다.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="availableTime">가능 시간</label>
        <input type="hidden" id="availableTime" name="availableTime" data-available-time-input
               th:value="${profile == null ? defaultAvailableTime : profile.availableTime()}">
        <div class="time-range-fields" data-time-range>
          <input class="form-input" id="availableStartTime" type="time" required data-time-start
                 th:value="${availableStartTime}">
          <span class="time-range-separator">~</span>
          <input class="form-input" id="availableEndTime" type="time" required data-time-end
                 th:value="${availableEndTime}">
        </div>
        <p class="form-help">저장 시 `오늘 18:00-23:00`처럼 같은 형식으로 등록돼요.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="preferredArea">희망 지역</label>
        <input type="hidden" id="preferredArea" name="preferredArea" data-preferred-area-input
               th:value="${profile == null ? '' : profile.preferredArea()}">
        <div class="select-grid" data-region-picker
             data-region-districts='{"서울특별시":["강남구","마포구","서초구","송파구"],"부산광역시":["부산진구","해운대구","수영구"],"인천광역시":["부평구","남동구","연수구"],"경기도":["수원시","성남시","고양시","용인시"]}'>
          <select class="form-input" id="preferredProvince" data-region-province required>
            <option value="">도/광역시 선택</option>
            <option value="서울특별시">서울특별시</option>
            <option value="부산광역시">부산광역시</option>
            <option value="인천광역시">인천광역시</option>
            <option value="경기도">경기도</option>
          </select>
          <select class="form-input" id="preferredDistrict" data-region-district required>
            <option value="">구/시 선택</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="desiredHourlyWage">희망 시급</label>
        <div class="wage-input-wrap">
          <input class="form-input" id="desiredHourlyWage" name="desiredHourlyWage" type="number"
                 th:min="${minimumHourlyWage}" step="100" required
                 th:placeholder="${minimumHourlyWage}"
                 th:value="${profile == null ? minimumHourlyWage : profile.desiredHourlyWage()}">
          <span class="wage-suffix">원</span>
        </div>
        <p class="form-help" th:text="'2026년 최저시급 ' + ${#numbers.formatInteger(minimumHourlyWage, 0, 'COMMA')} + '원이 기본값으로 입력돼 있어요.'">2026년 최저시급 10,320원이 기본값으로 입력돼 있어요.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="experiencedIndustries">경험 업종</label>
        <input type="hidden" id="experiencedIndustries" name="experiencedIndustries" data-experienced-industries-input
               th:value="${experiencedIndustries}">
        <div class="select-grid" data-industry-picker
             data-industry-options='{"외식·음료":["음료제조","홀서빙","주방보조","설거지"],"매장관리":["고객응대","계산","매장정리","재고정리"],"서비스":["안내","행사보조","청소"],"사무보조":["문서정리","자료입력","전화응대"]}'>
          <select class="form-input" id="experiencedIndustryGroup" data-industry-group>
            <option value="">대분류 선택</option>
            <option value="외식·음료">외식·음료</option>
            <option value="매장관리">매장관리</option>
            <option value="서비스">서비스</option>
            <option value="사무보조">사무보조</option>
          </select>
          <select class="form-input" id="experiencedIndustrySelect" data-industry-detail>
            <option value="">세부 업무 선택</option>
          </select>
        </div>
      </div>

      <label class="check-row">
        <input type="checkbox" name="urgentSubstituteAvailable" value="true"
               th:checked="${profile == null || profile.urgentSubstituteAvailable()}">
        <span>긴급 대타 요청을 받을 수 있어요</span>
      </label>

      <div class="form-group">
        <label class="form-label" for="introduction">소개</label>
        <textarea class="form-input" id="introduction" name="introduction" rows="4" required
                  placeholder="예: 카페 마감 경험이 있고, 오늘 저녁 긴급 대타 가능합니다."
                  th:text="${profile == null ? '' : profile.introduction()}"></textarea>
      </div>

      <button class="btn btn-primary" type="submit">
        <i class="fa-solid fa-check"></i>
        프로필 저장
      </button>
    </form>
  </section>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
